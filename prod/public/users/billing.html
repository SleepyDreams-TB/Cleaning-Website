<!DOCTYPE html>
<html lang="en">

<head>
  <link rel="icon" href="/assets/burger.ico" type="image/x-icon">
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Edit Billing Information</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <style>
    body {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
    }

    .billing-container {
      background: rgba(255, 255, 255, 0.95);
      backdrop-filter: blur(10px);
      border-radius: 20px;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
    }

    .billing-header {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
      padding: 40px;
      border-radius: 20px 20px 0 0;
      text-align: center;
    }

    .billing-header h2 {
      font-size: 32px;
      font-weight: bold;
      margin-bottom: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
    }

    .billing-header p {
      opacity: 0.9;
      font-size: 14px;
    }

    .form-section {
      padding: 40px;
    }

    .form-group {
      margin-bottom: 24px;
    }

    .form-group label {
      display: flex;
      align-items: center;
      gap: 8px;
      font-weight: 600;
      color: #1f2937;
      margin-bottom: 8px;
      font-size: 14px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .form-group label i {
      color: #667eea;
      font-size: 16px;
    }

    .form-input {
      width: 100%;
      border: 2px solid #e5e7eb;
      padding: 12px 16px;
      border-radius: 10px;
      font-size: 14px;
      transition: all 0.3s;
      background: white;
      font-family: inherit;
    }

    .form-input:focus {
      outline: none;
      border-color: #667eea;
      box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
    }

    .form-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 24px;
    }

    .form-grid.full {
      grid-template-columns: 1fr;
    }

    .btn-submit {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
      padding: 14px 32px;
      border-radius: 10px;
      border: none;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s;
      width: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      font-size: 16px;
      margin-top: 8px;
    }

    .btn-submit:hover {
      transform: translateY(-2px);
      box-shadow: 0 10px 25px rgba(102, 126, 234, 0.4);
    }

    .btn-submit:disabled {
      opacity: 0.6;
      cursor: not-allowed;
      transform: none;
      box-shadow: none;
    }

    .btn-cancel {
      background: #f3f4f6;
      color: #6b7280;
      padding: 14px 32px;
      border-radius: 10px;
      border: none;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s;
      width: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      font-size: 16px;
      margin-top: 8px;
    }

    .btn-cancel:hover {
      background: #e5e7eb;
    }

    .info-box {
      background: #eff6ff;
      border-left: 4px solid #667eea;
      padding: 14px 16px;
      border-radius: 8px;
      margin-bottom: 24px;
      font-size: 14px;
      color: #1f2937;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .divider {
      height: 1px;
      background: #e5e7eb;
      margin: 32px 0;
    }

    /* ── Address Cards ── */
    .address-card {
      display: flex;
      justify-content: space-between;
      align-items: center;
      background: #f9fafb;
      border: 2px solid #e5e7eb;
      border-radius: 12px;
      padding: 16px 20px;
      margin-bottom: 12px;
      transition: border-color 0.2s;
    }

    .address-card:hover {
      border-color: #667eea;
    }

    .address-card-name {
      font-weight: 700;
      color: #1f2937;
      font-size: 15px;
      margin-bottom: 4px;
    }

    .address-card-name i {
      color: #667eea;
    }

    .address-card-detail {
      font-size: 13px;
      color: #6b7280;
    }

    .address-card-actions {
      display: flex;
      gap: 8px;
      flex-shrink: 0;
      margin-left: 16px;
    }

    .btn-edit {
      background: #eff6ff;
      color: #667eea;
      border: 1px solid #667eea;
      padding: 6px 14px;
      border-radius: 8px;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .btn-edit:hover {
      background: #667eea;
      color: white;
    }

    .btn-delete {
      background: #fff0f0;
      color: #ef4444;
      border: 1px solid #ef4444;
      padding: 6px 12px;
      border-radius: 8px;
      font-size: 13px;
      cursor: pointer;
      transition: all 0.2s;
    }

    .btn-delete:hover {
      background: #ef4444;
      color: white;
    }

    .btn-add-new {
      background: white;
      color: #667eea;
      border: 2px dashed #667eea;
      padding: 12px 24px;
      border-radius: 10px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      font-size: 14px;
      width: 100%;
      margin-top: 8px;
    }

    .btn-add-new:hover {
      background: #eff6ff;
    }

    .section-label {
      font-size: 13px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: #9ca3af;
      margin-bottom: 16px;
    }

    @media (max-width: 768px) {
      .form-grid {
        grid-template-columns: 1fr;
      }

      .billing-container {
        margin: 16px;
      }

      .form-section {
        padding: 24px;
      }

      .billing-header {
        padding: 30px 20px;
      }

      .billing-header h2 {
        font-size: 24px;
      }

      .address-card {
        flex-direction: column;
        align-items: flex-start;
        gap: 12px;
      }

      .address-card-actions {
        margin-left: 0;
        width: 100%;
      }

      .btn-edit,
      .btn-delete {
        flex: 1;
        justify-content: center;
      }
    }
  </style>
</head>

<body>

  <header class="bg-black shadow p-4 flex justify-between items-center">
    <nav>
      <div id="navbar-container"></div>
    </nav>
  </header>

  <main class="container mx-auto py-12 pb-12">
    <div class="billing-container">

      <!-- Header -->
      <div class="billing-header">
        <h2>
          <i class="fas fa-map-marker-alt"></i> Billing Information
        </h2>
        <p>Manage your delivery addresses</p>
      </div>

      <!-- Content -->
      <div class="form-section">

        <!-- Message Box -->
        <div id="billingMessage" class="info-box hidden">
          <i id="billingIcon" class="fas"></i>
          <span id="billingText"></span>
        </div>

        <!-- ── Saved Addresses Section ── -->
        <div class="section-label">
          <i class="fas fa-bookmark"></i> Saved Addresses
        </div>

        <div id="addressList">
          <!-- Rendered by billing.js -->
        </div>

        <button id="addNewBtn" class="btn-add-new">
          <i class="fas fa-plus"></i> Add New Address
        </button>

        <div class="divider"></div>

        <!-- ── Form Section ── -->
        <div class="section-label" id="formTitle">Add New Address</div>

        <form id="billingForm" class="space-y-0">

          <!-- Address Name -->
          <div class="form-group">
            <label for="address_name">
              <i class="fas fa-tag"></i> Address Name
            </label>
            <input type="text" id="address_name" class="form-input" placeholder="e.g., Home, Office, Apartment"
              required>
            <p class="text-sm text-gray-500 mt-2">Give this address a memorable name</p>
          </div>

          <div class="divider"></div>

          <!-- Address Details Grid -->
          <div class="form-grid">
            <div class="form-group">
              <label for="street">
                <i class="fas fa-road"></i> Street Address
              </label>
              <input type="text" id="street" class="form-input" placeholder="123 Main Street" required>
            </div>

            <div class="form-group">
              <label for="suburb">
                <i class="fas fa-location-dot"></i> Suburb
              </label>
              <input type="text" id="suburb" class="form-input" placeholder="e.g., Sandton" required>
            </div>

            <div class="form-group">
              <label for="city">
                <i class="fas fa-building"></i> City
              </label>
              <input type="text" id="city" class="form-input" placeholder="e.g., Johannesburg" required>
            </div>

            <div class="form-group">
              <label for="postal_code">
                <i class="fas fa-envelope"></i> Postal Code
              </label>
              <input type="text" id="postal_code" class="form-input" placeholder="e.g., 2000" required>
            </div>
          </div>

          <div class="divider"></div>

          <!-- Country -->
          <div class="form-group">
            <label for="country">
              <i class="fas fa-globe"></i> Country
            </label>
            <input type="text" id="country" class="form-input" placeholder="e.g., South Africa" value="South Africa"
              required>
          </div>

          <!-- Buttons -->
          <button type="submit" id="submitBtn" class="btn-submit">
            <i class="fas fa-save"></i> Save Address
          </button>

          <button type="button" id="cancelBtn" class="btn-cancel hidden">
            <i class="fas fa-times"></i> Cancel Edit
          </button>

        </form>
      </div>
    </div>
  </main>

  <footer class="text-center text-sm py-6 bg-gray-100">
    © 2025 King Burger's Store. All rights reserved.
  </footer>

  <script type="module">
    import { initNavbar } from '/navbar.js';
    initNavbar("navbar-container");
  </script>
  <script type="module" src="billing.js"></script>

</body>

</html>
