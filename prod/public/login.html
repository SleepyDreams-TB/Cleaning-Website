<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login - King Burgers Store</title>
  <link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;600;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Sora', sans-serif;
      background: linear-gradient(135deg, #0a1e3e 0%, #1a3a5c 50%, #0d2d5c 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 1rem;
      position: relative;
      overflow: hidden;
    }

    .bg-accent {
      position: fixed;
      pointer-events: none;
      opacity: 0.1;
      z-index: 0;
    }
    .accent-1 {
      width: 400px; height: 400px;
      background: radial-gradient(circle, #2563eb 0%, transparent 70%);
      border-radius: 50%;
      top: -100px; right: -100px;
      animation: float 8s ease-in-out infinite;
    }
    .accent-2 {
      width: 300px; height: 300px;
      background: radial-gradient(circle, #3b82f6 0%, transparent 70%);
      border-radius: 50%;
      bottom: -50px; left: -100px;
      animation: float 10s ease-in-out infinite reverse;
    }
    @keyframes float {
      0%, 100% { transform: translateY(0px); }
      50% { transform: translateY(30px); }
    }

    .container {
      position: relative;
      z-index: 1;
      width: 100%;
      max-width: 420px;
    }

    /* ── Card & slider ── */
    .card-outer {
      background: rgba(255,255,255,0.95);
      backdrop-filter: blur(10px);
      border-radius: 2rem;
      box-shadow: 0 20px 60px rgba(0,0,0,0.3);
      border: 1px solid rgba(255,255,255,0.2);
      overflow: hidden;
      animation: slideUp 0.6s ease-out;
    }
    @keyframes slideUp {
      from { opacity: 0; transform: translateY(30px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .slider-track {
      display: flex;
      width: 200%;
      transition: transform 0.45s cubic-bezier(0.65, 0, 0.35, 1);
    }
    .slider-track.show-step2 {
      transform: translateX(-50%);
    }

    .step {
      width: 50%;
      padding: 3rem 2rem;
      flex-shrink: 0;
    }

    /* ── Header ── */
    .header {
      text-align: center;
      margin-bottom: 2.5rem;
    }
    .logo {
      font-family: 'Space Mono', monospace;
      font-size: 1.75rem;
      font-weight: 700;
      color: #1a1a2e;
      margin-bottom: 0.5rem;
      letter-spacing: 1px;
    }
    .tagline {
      color: #666;
      font-size: 0.875rem;
      letter-spacing: 0.5px;
    }

    /* ── Progress indicator ── */
    .progress-bar {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.5rem;
      margin-bottom: 2rem;
    }
    .dot {
      width: 8px; height: 8px;
      border-radius: 50%;
      background: #d0d0d0;
      transition: all 0.3s ease;
    }
    .dot.active {
      background: #2563eb;
      width: 24px;
      border-radius: 4px;
    }
    .dot.done {
      background: #2563eb;
      opacity: 0.4;
    }

    /* ── Form elements ── */
    .form-group { margin-bottom: 1.5rem; }

    label {
      display: block;
      font-size: 0.8rem;
      font-weight: 600;
      color: #1a1a2e;
      margin-bottom: 0.5rem;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    input[type="text"],
    input[type="password"] {
      width: 100%;
      padding: 1rem 1.25rem;
      border: 2px solid #e0e0e0;
      border-radius: 1.25rem;
      font-size: 1rem;
      font-family: 'Sora', sans-serif;
      transition: all 0.3s cubic-bezier(0.4,0,0.2,1);
      background: #fafafa;
    }
    input:focus {
      outline: none;
      border-color: #2563eb;
      background: white;
      box-shadow: 0 0 0 4px rgba(37,99,235,0.1);
    }
    input::placeholder { color: #999; }

    /* ── OTP input ── */
    .otp-wrapper {
      display: flex;
      gap: 0.5rem;
      justify-content: center;
      margin-bottom: 1.5rem;
    }
    .otp-digit {
      width: 48px; height: 56px;
      border: 2px solid #e0e0e0;
      border-radius: 0.75rem;
      font-size: 1.5rem;
      font-family: 'Space Mono', monospace;
      font-weight: 700;
      text-align: center;
      color: #1a1a2e;
      background: #fafafa;
      transition: all 0.2s ease;
      caret-color: #2563eb;
    }
    .otp-digit:focus {
      outline: none;
      border-color: #2563eb;
      background: white;
      box-shadow: 0 0 0 4px rgba(37,99,235,0.1);
      transform: translateY(-2px);
    }
    .otp-digit.filled {
      border-color: #2563eb;
      background: #eff6ff;
    }

    /* ── QR section ── */
    .qr-section {
      text-align: center;
      margin-bottom: 1.5rem;
      display: none;
    }
    .qr-section.show { display: block; }
    .qr-box {
      display: inline-block;
      padding: 1rem;
      background: white;
      border-radius: 1rem;
      border: 2px dashed #93c5fd;
      margin-bottom: 0.75rem;
    }
    .qr-box img { width: 160px; height: 160px; display: block; }
    .qr-hint {
      font-size: 0.8rem;
      color: #6b7280;
      line-height: 1.5;
    }

    /* ── Step 2 description ── */
    .step2-desc {
      text-align: center;
      color: #6b7280;
      font-size: 0.875rem;
      margin-bottom: 1.5rem;
      line-height: 1.6;
    }
    .step2-desc strong { color: #1a1a2e; }

    /* ── Submit button ── */
    .submit-btn {
      width: 100%;
      padding: 1rem 1.5rem;
      background: linear-gradient(135deg, #2563eb 0%, #3b82f6 100%);
      color: white;
      border: none;
      border-radius: 1.25rem;
      font-size: 1rem;
      font-weight: 700;
      font-family: 'Sora', sans-serif;
      cursor: pointer;
      transition: all 0.3s cubic-bezier(0.4,0,0.2,1);
      text-transform: uppercase;
      letter-spacing: 0.5px;
      position: relative;
      overflow: hidden;
    }
    .submit-btn::before {
      content: '';
      position: absolute;
      top: 0; left: -100%;
      width: 100%; height: 100%;
      background: rgba(255,255,255,0.2);
      transition: left 0.4s ease;
    }
    .submit-btn:hover::before { left: 100%; }
    .submit-btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 10px 25px rgba(37,99,235,0.3);
    }
    .submit-btn:active { transform: translateY(0); }
    .submit-btn:disabled {
      opacity: 0.7;
      cursor: not-allowed;
      transform: none;
    }

    /* ── Back link ── */
    .back-link {
      display: flex;
      align-items: center;
      gap: 0.4rem;
      background: none;
      border: none;
      color: #6b7280;
      font-size: 0.8rem;
      font-family: 'Sora', sans-serif;
      cursor: pointer;
      padding: 0;
      margin-bottom: 1.5rem;
      transition: color 0.2s;
    }
    .back-link:hover { color: #2563eb; }

    /* ── Error message ── */
    .error-msg {
      margin-top: 0.75rem;
      padding: 0.75rem 1rem;
      background: #fef2f2;
      border-left: 4px solid #ef4444;
      border-radius: 0.75rem;
      color: #b91c1c;
      font-size: 0.85rem;
      font-weight: 500;
      display: none;
      animation: shake 0.4s ease-in-out;
    }
    .error-msg.show { display: block; }
    @keyframes shake {
      0%, 100% { transform: translateX(0); }
      25% { transform: translateX(-5px); }
      75% { transform: translateX(5px); }
    }

    /* ── Spinner ── */
    .btn-inner { display: flex; align-items: center; justify-content: center; gap: 0.5rem; }
    .spinner {
      width: 18px; height: 18px;
      border: 2px solid rgba(255,255,255,0.4);
      border-top-color: white;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      display: none;
    }
    .submit-btn.loading .spinner { display: block; }
    .submit-btn.loading .btn-text { opacity: 0.7; }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── Footer ── */
    .footer-text {
      text-align: center;
      margin-top: 1.75rem;
      font-size: 0.75rem;
      color: #999;
      letter-spacing: 0.5px;
    }
    .footer-text a { color: #2563eb; text-decoration: none; }
    .footer-text a:hover { text-decoration: underline; }

    @media (max-width: 640px) {
      .step { padding: 2rem 1.5rem; }
      .logo { font-size: 1.5rem; }
      .otp-digit { width: 40px; height: 48px; font-size: 1.25rem; }
    }
  </style>
</head>
<body>
  <div class="bg-accent accent-1"></div>
  <div class="bg-accent accent-2"></div>

  <div class="container">
    <div class="card-outer">
      <div class="slider-track" id="sliderTrack">

        <!-- ── STEP 1: Username + Password ── -->
        <div class="step" id="step1">
          <div class="header">
            <div class="logo">👑 KING BURGERS</div>
            <div class="tagline">Welcome back</div>
          </div>

          <div class="progress-bar">
            <div class="dot active" id="dot1"></div>
            <div class="dot" id="dot2"></div>
          </div>

          <form id="loginForm">
            <div class="form-group">
              <label for="userName">Username</label>
              <input type="text" id="userName" name="userName" placeholder="Enter your username"
                required autocomplete="username">
            </div>
            <div class="form-group">
              <label for="password">Password</label>
              <input type="password" id="password" name="password" placeholder="Enter your password"
                required autocomplete="current-password">
            </div>
            <button type="submit" class="submit-btn" id="loginBtn">
              <div class="btn-inner">
                <span class="btn-text">Continue</span>
                <div class="spinner"></div>
              </div>
            </button>
            <div class="error-msg" id="loginError"></div>
          </form>

          <div class="footer-text">
            No account? <a href="/register">Register here</a>
          </div>
        </div>

        <!-- ── STEP 2: 2FA ── -->
        <div class="step" id="step2">
          <div class="header">
            <div class="logo">👑 KING BURGERS</div>
            <div class="tagline">Two-factor authentication</div>
          </div>

          <div class="progress-bar">
            <div class="dot done" id="dot1b"></div>
            <div class="dot active" id="dot2b"></div>
          </div>

          <button class="back-link" id="backBtn">
            ← Back to login
          </button>

          <!-- QR code for new users only -->
          <div class="qr-section" id="qrSection">
            <div class="qr-box">
              <img id="qrImage" src="" alt="Scan with your authenticator app">
            </div>
            <p class="qr-hint">Scan this QR code with Google Authenticator<br>or Authy, then enter the 6-digit code below.</p>
          </div>

          <p class="step2-desc" id="step2Desc">
            Enter the 6-digit code from your <strong>authenticator app</strong>.
          </p>

          <form id="otpForm">
            <div class="otp-wrapper" id="otpWrapper">
              <input class="otp-digit" maxlength="1" inputmode="numeric" pattern="[0-9]" autocomplete="one-time-code">
              <input class="otp-digit" maxlength="1" inputmode="numeric" pattern="[0-9]">
              <input class="otp-digit" maxlength="1" inputmode="numeric" pattern="[0-9]">
              <input class="otp-digit" maxlength="1" inputmode="numeric" pattern="[0-9]">
              <input class="otp-digit" maxlength="1" inputmode="numeric" pattern="[0-9]">
              <input class="otp-digit" maxlength="1" inputmode="numeric" pattern="[0-9]">
            </div>

            <button type="submit" class="submit-btn" id="verifyBtn">
              <div class="btn-inner">
                <span class="btn-text">Verify & Sign In</span>
                <div class="spinner"></div>
              </div>
            </button>
            <div class="error-msg" id="otpError"></div>
          </form>

          <div class="footer-text">
            Lost access to your authenticator? <a href="/support">Contact support</a>
          </div>
        </div>

      </div><!-- /slider-track -->
    </div><!-- /card-outer -->
  </div>

  <script>
    const track = document.getElementById('sliderTrack');
    const loginBtn = document.getElementById('loginBtn');
    const verifyBtn = document.getElementById('verifyBtn');
    const loginError = document.getElementById('loginError');
    const otpError = document.getElementById('otpError');
    const otpDigits = document.querySelectorAll('.otp-digit');

    let storedUserId = null;

    // ── Slide helpers ──
    function goToStep2() {
      track.classList.add('show-step2');
      document.getElementById('dot1').classList.remove('active');
      document.getElementById('dot1').classList.add('done');
      document.getElementById('dot2').classList.add('active');
      // Focus first OTP digit after transition
      setTimeout(() => otpDigits[0].focus(), 460);
    }

    function goToStep1() {
      track.classList.remove('show-step2');
      otpDigits.forEach(d => { d.value = ''; d.classList.remove('filled'); });
      otpError.classList.remove('show');
      loginError.classList.remove('show');
    }

    document.getElementById('backBtn').addEventListener('click', goToStep1);

    // ── OTP digit auto-advance ──
    otpDigits.forEach((digit, i) => {
      digit.addEventListener('input', e => {
        const val = e.target.value.replace(/\D/g, '');
        e.target.value = val;
        if (val) {
          e.target.classList.add('filled');
          if (i < otpDigits.length - 1) otpDigits[i + 1].focus();
          // Auto-submit when last digit entered
          if (i === otpDigits.length - 1) {
            document.getElementById('otpForm').dispatchEvent(new Event('submit'));
          }
        } else {
          e.target.classList.remove('filled');
        }
      });

      digit.addEventListener('keydown', e => {
        if (e.key === 'Backspace' && !e.target.value && i > 0) {
          otpDigits[i - 1].focus();
          otpDigits[i - 1].value = '';
          otpDigits[i - 1].classList.remove('filled');
        }
      });

      // Handle paste on any digit
      digit.addEventListener('paste', e => {
        e.preventDefault();
        const pasted = (e.clipboardData || window.clipboardData)
          .getData('text').replace(/\D/g, '').slice(0, 6);
        pasted.split('').forEach((ch, idx) => {
          if (otpDigits[idx]) {
            otpDigits[idx].value = ch;
            otpDigits[idx].classList.add('filled');
          }
        });
        if (pasted.length === 6) {
          document.getElementById('otpForm').dispatchEvent(new Event('submit'));
        }
      });
    });

    // ── STEP 1: Login ──
    document.getElementById('loginForm').addEventListener('submit', async e => {
      e.preventDefault();
      loginError.classList.remove('show');
      loginBtn.disabled = true;
      loginBtn.classList.add('loading');

      try {
        const formData = new FormData(document.getElementById('loginForm'));
        const res = await fetch('https://api.kingburger.site/auth/login-step', {
          method: 'POST',
          headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
          body: new URLSearchParams(formData)
        });

        const result = await res.json();

        if (!res.ok) {
          throw new Error(result.error || 'Login failed. Please try again.');
        }

        storedUserId = result.user_id;

        // New user — show QR
        if (!result.registered) {
          document.getElementById('qrSection').classList.add('show');
          document.getElementById('qrImage').src = result.qr_code;
          document.getElementById('step2Desc').innerHTML =
            'Scan the QR code above with your authenticator app,<br>then enter the <strong>6-digit code</strong> below.';
        }

        goToStep2();

      } catch (err) {
        loginError.textContent = err.message === 'Failed to fetch'
          ? 'Network error. Please check your connection.'
          : err.message || 'Login failed. Please check your credentials.';
        loginError.classList.add('show');
      } finally {
        loginBtn.disabled = false;
        loginBtn.classList.remove('loading');
      }
    });

    // ── STEP 2: 2FA verify ──
    document.getElementById('otpForm').addEventListener('submit', async e => {
      e.preventDefault();
      otpError.classList.remove('show');

      const digit_code = Array.from(otpDigits).map(d => d.value).join('');
      if (digit_code.length < 6) {
        otpError.textContent = 'Please enter all 6 digits.';
        otpError.classList.add('show');
        return;
      }

      if (!storedUserId) {
        otpError.textContent = 'Session lost. Please go back and log in again.';
        otpError.classList.add('show');
        return;
      }

      verifyBtn.disabled = true;
      verifyBtn.classList.add('loading');

      try {
        const res = await fetch('https://api.kingburger.site/auth/qr-step', {
          method: 'POST',
          credentials: 'include',
          headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
          body: new URLSearchParams({ user_id: storedUserId, digit_code })
        });

        const result = await res.json();

        if (!res.ok || !result.success) {
          // Clear OTP digits on failure
          otpDigits.forEach(d => { d.value = ''; d.classList.remove('filled'); });
          otpDigits[0].focus();
          throw new Error(result.error || 'Invalid code. Please try again.');
        }

        // Cookie is set — no token to store
        const redirectTo = sessionStorage.getItem('redirectAfterLogin') || '/';
        sessionStorage.removeItem('redirectAfterLogin');
        window.location.href = redirectTo;

      } catch (err) {
        otpError.textContent = err.message || 'Verification failed. Please try again.';
        otpError.classList.add('show');
      } finally {
        verifyBtn.disabled = false;
        verifyBtn.classList.remove('loading');
      }
    });
  </script>
</body>
</html>
