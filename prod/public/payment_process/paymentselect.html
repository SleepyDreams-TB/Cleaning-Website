<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Payment Selection</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link
    href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap"
    rel="stylesheet">
  <style>
    * {
      font-family: 'DM Sans', sans-serif;
    }

    .mono {
      font-family: 'DM Mono', monospace;
    }

    body {
      background: #0f0f0f;
      background-image: radial-gradient(ellipse at 20% 50%, rgba(99, 102, 241, 0.08) 0%, transparent 60%),
        radial-gradient(ellipse at 80% 20%, rgba(168, 85, 247, 0.06) 0%, transparent 50%);
      min-height: 100vh;
    }

    .card-shine {
      background: linear-gradient(135deg, #1a1a2e 0%, #16213e 40%, #1a1a2e 100%);
      position: relative;
      overflow: hidden;
    }

    .card-shine::before {
      content: '';
      position: absolute;
      top: -50%;
      left: -50%;
      width: 200%;
      height: 200%;
      background: radial-gradient(circle at 30% 40%, rgba(255, 255, 255, 0.04) 0%, transparent 50%);
      pointer-events: none;
    }

    .payment-btn {
      transition: all 0.2s ease;
      border: 1px solid rgba(255, 255, 255, 0.08);
    }

    .payment-btn:hover {
      border-color: rgba(99, 102, 241, 0.5);
      background: rgba(99, 102, 241, 0.08);
      transform: translateY(-1px);
    }

    .payment-btn.active {
      border-color: rgba(99, 102, 241, 0.8);
      background: rgba(99, 102, 241, 0.12);
    }

    .form-input {
      background: rgba(255, 255, 255, 0.04);
      border: 1px solid rgba(255, 255, 255, 0.1);
      color: #f1f1f1;
      transition: all 0.2s ease;
    }

    .form-input:focus {
      outline: none;
      border-color: rgba(99, 102, 241, 0.6);
      background: rgba(99, 102, 241, 0.06);
      box-shadow: 0 0 0 3px rgba(99, 102, 241, 0.1);
    }

    .form-input::placeholder {
      color: rgba(255, 255, 255, 0.2);
    }

    .submit-btn {
      background: linear-gradient(135deg, #6366f1, #8b5cf6);
      transition: all 0.2s ease;
    }

    .submit-btn:hover {
      background: linear-gradient(135deg, #4f46e5, #7c3aed);
      transform: translateY(-1px);
      box-shadow: 0 8px 25px rgba(99, 102, 241, 0.3);
    }

    .submit-btn:active {
      transform: translateY(0);
    }

    .slide-down {
      animation: slideDown 0.25s ease forwards;
    }

    @keyframes slideDown {
      from {
        opacity: 0;
        transform: translateY(-8px);
      }

      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .chip {
      width: 38px;
      height: 28px;
      background: linear-gradient(135deg, #d4a843, #f0c860);
      border-radius: 5px;
    }

    .chip::after {
      content: '';
      display: block;
      width: 100%;
      height: 100%;
      border-radius: 5px;
      background: repeating-linear-gradient(90deg, transparent, transparent 8px, rgba(0, 0, 0, 0.15) 8px, rgba(0, 0, 0, 0.15) 9px),
        repeating-linear-gradient(0deg, transparent, transparent 6px, rgba(0, 0, 0, 0.15) 6px, rgba(0, 0, 0, 0.15) 7px);
    }

    select option {
      background: #1a1a2e;
    }
  </style>
</head>

<body class="flex items-center justify-center min-h-screen p-4">

  <div class="w-full max-w-md">

    <!-- Header -->
    <div class="mb-8 text-center">
      <p class="text-xs tracking-[0.2em] uppercase text-indigo-400 mb-2">Secure Checkout</p>
      <h1 class="text-2xl font-semibold text-white">Choose Payment Method</h1>
    </div>

    <!-- Payment Method Tabs -->
    <div class="flex gap-2 mb-6">
      <button onclick="selectMethod('eft')" id="tab-eft"
        class="payment-btn flex-1 py-3 px-4 rounded-xl text-sm font-medium text-white flex flex-col items-center gap-1.5 active">
        <svg class="w-5 h-5 text-indigo-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5"
            d="M3 10h18M7 15h1m4 0h1m-7 4h12a3 3 0 003-3V8a3 3 0 00-3-3H6a3 3 0 00-3 3v8a3 3 0 003 3z" />
        </svg>
        <span>EFTsecure</span>
      </button>
      <button onclick="selectMethod('card')" id="tab-card"
        class="payment-btn flex-1 py-3 px-4 rounded-xl text-sm font-medium text-white flex flex-col items-center gap-1.5">
        <svg class="w-5 h-5 text-indigo-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5"
            d="M3 10h18M7 15h1m4 0h1m-7 4h12a3 3 0 003-3V8a3 3 0 00-3-3H6a3 3 0 00-3 3v8a3 3 0 003 3z" />
        </svg>
        <span>Credit Card</span>
      </button>
      <button onclick="selectMethod('paypal')" id="tab-paypal"
        class="payment-btn flex-1 py-3 px-4 rounded-xl text-sm font-medium text-white flex flex-col items-center gap-1.5">
        <svg class="w-5 h-5 text-indigo-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5"
            d="M17 9V7a2 2 0 00-2-2H5a2 2 0 00-2 2v6a2 2 0 002 2h2m2 4h10a2 2 0 002-2v-6a2 2 0 00-2-2H9a2 2 0 00-2 2v6a2 2 0 002 2z" />
        </svg>
        <span>PayPal</span>
      </button>
    </div>

    <!-- EFT Panel -->
    <div id="panel-eft" class="panel">
      <div class="card-shine rounded-2xl p-6 border border-white/[0.06]">
        <p class="text-white/50 text-sm mb-4">Select your bank to continue with EFTsecure</p>
        <div class="mb-5">
          <label class="block text-xs text-white/40 uppercase tracking-widest mb-2">Your Bank</label>
          <select id="select_bank" class="form-input w-full rounded-xl px-4 py-3 text-sm">
            <option value="">Select a bank...</option>
            <option value="absa">ABSA</option>
            <option value="fnb">First National Bank</option>
            <option value="nedbank">Nedbank</option>
            <option value="standard">Standard Bank</option>
            <option value="tyme">Tyme - min: R10</option>
            <option value="investec">Investec</option>
            <option value="bidvest">Bidvest Bank</option>
            <option value="oldmutual">Old Mutual</option>
            <option value="afribank">African Bank</option>
          </select>
        </div>
        <button id="eftsecure-button"
          class="submit-btn w-full py-3.5 rounded-xl text-white text-sm font-semibold tracking-wide">
          Continue with EFTsecure
        </button>
      </div>
    </div>

    <!-- Card Panel -->
    <div id="panel-card" class="panel hidden">

      <!-- Card Preview -->
      <div class="card-shine rounded-2xl p-6 border border-white/[0.06] mb-4 h-44 flex flex-col justify-between">
        <div class="flex justify-between items-start">
          <div class="chip"></div>
          <span class="text-white/30 text-xs tracking-widest uppercase">Credit</span>
        </div>
        <div>
          <p id="card-preview-number" class="mono text-white/80 text-lg tracking-[0.2em] mb-3">•••• •••• •••• ••••</p>
          <div class="flex justify-between items-end">
            <div>
              <p class="text-white/30 text-[10px] uppercase tracking-widest mb-0.5">Cardholder</p>
              <p id="card-preview-name" class="text-white/70 text-sm">YOUR NAME</p>
            </div>
            <div class="text-right">
              <p class="text-white/30 text-[10px] uppercase tracking-widest mb-0.5">Expires</p>
              <p id="card-preview-expiry" class="mono text-white/70 text-sm">MM/YY</p>
            </div>
          </div>
        </div>
      </div>

      <!-- Card Sub-tabs -->
      <div class="flex gap-2 mb-4">
        <button onclick="selectCardType('existing')" id="sub-existing"
          class="payment-btn flex-1 py-2.5 px-3 rounded-xl text-xs font-medium text-white active">
          Saved Card
        </button>
        <button onclick="selectCardType('new')" id="sub-new"
          class="payment-btn flex-1 py-2.5 px-3 rounded-xl text-xs font-medium text-white">
          New Card
        </button>
      </div>

      <!-- Existing Card -->
      <div id="card-existing" class="card-shine rounded-2xl p-5 border border-white/[0.06]">
        <div class="flex items-center gap-4 mb-5">
          <div class="w-10 h-10 rounded-full bg-indigo-500/20 flex items-center justify-center">
            <svg class="w-5 h-5 text-indigo-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5"
                d="M3 10h18M7 15h1m4 0h1m-7 4h12a3 3 0 003-3V8a3 3 0 00-3-3H6a3 3 0 00-3 3v8a3 3 0 003 3z" />
            </svg>
          </div>
          <div>
            <p class="text-white text-sm font-medium">•••• •••• •••• 4242</p>
          </div>
          <div class="ml-auto w-4 h-4 rounded-full border-2 border-indigo-400 flex items-center justify-center">
            <div class="w-2 h-2 rounded-full bg-indigo-400"></div>
          </div>
        </div>
        <button id="credit-card-saved"
          class="submit-btn w-full py-3.5 rounded-xl text-white text-sm font-semibold tracking-wide">
          Pay with Saved Card
        </button>
      </div>

      <!-- New Card Form -->
      <div id="card-new" class="card-shine rounded-2xl p-5 border border-white/[0.06] hidden">
        <div class="space-y-4">
          <div>
            <label class="block text-xs text-white/40 uppercase tracking-widest mb-2">Card Number</label>
            <input id="card-number" type="text" inputmode="numeric" placeholder="1234 5678 9012 3456" maxlength="19"
              autocomplete="cc-number" class="form-input w-full rounded-xl px-4 py-3 text-sm mono">
          </div>
          <div>
            <label class="block text-xs text-white/40 uppercase tracking-widest mb-2">Cardholder Name</label>
            <input id="card-holder" type="text" placeholder="Name as it appears on card" autocomplete="cc-name"
              class="form-input w-full rounded-xl px-4 py-3 text-sm">
          </div>
          <div class="grid grid-cols-2 gap-3">
            <div>
              <label class="block text-xs text-white/40 uppercase tracking-widest mb-2">Expiry</label>
              <input id="expiry-date" type="text" inputmode="numeric" placeholder="MM/YY" maxlength="5"
                autocomplete="cc-exp" class="form-input w-full rounded-xl px-4 py-3 text-sm mono">
            </div>
            <div>
              <label class="block text-xs text-white/40 uppercase tracking-widest mb-2">CVV</label>
              <input id="cvv" type="password" inputmode="numeric" placeholder="•••" maxlength="4" autocomplete="cc-csc"
                class="form-input w-full rounded-xl px-4 py-3 text-sm mono">
            </div>
          </div>
        </div>
        <button id="new-card-details"
          class="submit-btn w-full mt-5 py-3.5 rounded-xl text-white text-sm font-semibold tracking-wide">
          Pay Securely
        </button>
        <input type="checkbox" id="check-save-card" class="mt-4">
        <label for="save-card" class="text-white/40 text-sm ml-2">Remember my card for future purchases</label>
      </div>
    </div>

    <!-- PayPal Panel -->
    <div id="panel-paypal" class="panel hidden">
      <div class="card-shine rounded-2xl p-6 border border-white/[0.06] text-center">
        <div class="w-14 h-14 bg-blue-500/10 rounded-full flex items-center justify-center mx-auto mb-4">
          <svg class="w-7 h-7 text-blue-400" fill="currentColor" viewBox="0 0 24 24">
            <path
              d="M7.076 21.337H2.47a.641.641 0 0 1-.633-.74L4.944.901C5.026.382 5.474 0 5.998 0h7.46c2.57 0 4.578.543 5.69 1.81 1.01 1.15 1.304 2.42 1.012 4.287-.023.143-.047.288-.077.437-.983 5.05-4.349 6.797-8.647 6.797h-2.19c-.524 0-.968.382-1.05.9l-1.12 7.106zm14.146-14.42a3.35 3.35 0 0 0-.607-.541c-.013.076-.026.175-.041.254-.59 3.025-2.566 6.082-8.558 6.082H9.828l-1.323 8.4h3.297c.524 0 .967-.382 1.05-.9l.944-5.985h2.17c4.938 0 7.485-2.4 8.337-6.738.3-1.517.13-2.733-.081-3.572z" />
          </svg>
        </div>
        <p class="text-white font-medium mb-1">Pay with PayPal</p>
        <p class="text-white/40 text-sm mb-5">You'll be redirected to PayPal to complete your payment</p>
        <button class="submit-btn w-full py-3.5 rounded-xl text-white text-sm font-semibold tracking-wide">
          Continue to PayPal
        </button>
      </div>
    </div>

    <!-- Security note -->
    <div class="flex items-center justify-center gap-2 mt-5">
      <svg class="w-3.5 h-3.5 text-white/20" fill="none" stroke="currentColor" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
          d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z" />
      </svg>
      <p class="text-white/20 text-xs tracking-wide">256-bit SSL encrypted · PCI DSS compliant</p>
    </div>

  </div>

  <script>
    // ------------------- Tab Switching -------------------
    function selectMethod(method) {
      document.querySelectorAll('.panel').forEach(p => p.classList.add('hidden'));
      document.querySelectorAll('[id^="tab-"]').forEach(t => t.classList.remove('active'));
      document.getElementById('panel-' + method).classList.remove('hidden');
      document.getElementById('panel-' + method).classList.add('slide-down');
      document.getElementById('tab-' + method).classList.add('active');
    }

    function selectCardType(type) {
      document.getElementById('card-existing').classList.add('hidden');
      document.getElementById('card-new').classList.add('hidden');
      document.getElementById('sub-existing').classList.remove('active');
      document.getElementById('sub-new').classList.remove('active');
      document.getElementById('card-' + type).classList.remove('hidden');
      document.getElementById('card-' + type).classList.add('slide-down');
      document.getElementById('sub-' + type).classList.add('active');
    }

    // ------------------- Card Number Formatting -------------------
    const cardNumberInput = document.getElementById('card-number');
    const expiryInput = document.getElementById('expiry-date');
    const cvvInput = document.getElementById('cvv');
    const cardHolder = document.getElementById('card-holder');

    cardNumberInput.addEventListener('input', (e) => {
      let value = e.target.value.replace(/\D/g, '').substring(0, 16);
      e.target.value = value.replace(/(.{4})/g, '$1 ').trim();
      const preview = value.padEnd(16, '•');
      document.getElementById('card-preview-number').textContent =
        preview.replace(/(.{4})/g, '$1 ').trim();
    });

    cardNumberInput.addEventListener('keydown', (e) => {
      if (e.key === 'Backspace' && e.target.value.endsWith(' ')) {
        e.target.value = e.target.value.slice(0, -2);
        e.preventDefault();
      }
    });



    // ------------------- Expiry Formatting -------------------
    expiryInput.addEventListener('input', (e) => {
      let value = e.target.value.replace(/\D/g, '').substring(0, 4);
      if (value.length >= 2) {
        let month = parseInt(value.substring(0, 2));
        if (month > 12) month = 12;
        const monthStr = String(month).padStart(2, '0');
        e.target.value = monthStr + (value.length > 2 ? '/' + value.substring(2) : '/');
      } else {
        e.target.value = value;
      }
      document.getElementById('card-preview-expiry').textContent =
        e.target.value || 'MM/YY';
    });

    expiryInput.addEventListener('keydown', (e) => {
      if (e.key === 'Backspace' && e.target.value.endsWith('/')) {
        e.target.value = e.target.value.slice(0, -1);
        e.preventDefault();
      }
    });

    // ------------------- CVV Formatting -------------------
    cvvInput.addEventListener('input', (e) => {
      e.target.value = e.target.value.replace(/\D/g, '').substring(0, 4);
    });

    // ------------------- Name Preview -------------------
    cardHolder.addEventListener('input', (e) => {
      document.getElementById('card-preview-name').textContent =
        e.target.value.toUpperCase() || 'YOUR NAME';
    });
  </script>

  <script type="module">
    import { createPayment, tokenizeCardData } from '../payment_process/processhelpers.js';

    const eftButton = document.getElementById('eftsecure-button');
    const bankSelect = document.getElementById('select_bank');
    const savedCardButton = document.getElementById('credit-card-saved');
    const newCardButton = document.getElementById('new-card-details');
    const savedCardTab = document.getElementById('sub-existing');

    const guid = localStorage.getItem('guid');
    const last4Digits = localStorage.getItem('last4Digits');
    const cartAmount = parseFloat(localStorage.getItem('amount')) || 0;
    const selectedAddressType = localStorage.getItem('address_type');

    // Guard — if no address type, something went wrong, send back to cart
    if (!selectedAddressType) {
      alert('Session expired. Please try again.');
      window.location.href = '/users/cart.html';
    }

    // ----- Populate or hide saved card UI -----
    if (guid && last4Digits) {
      document.querySelector('#card-existing .text-white.text-sm.font-medium').textContent =
        `•••• •••• •••• ${last4Digits}`;
    } else {
      // No saved card — hide the tab and default straight to new card
      savedCardTab.style.display = 'none';
      selectCardType('new');
    }

    // ----- EFT -----
    eftButton.addEventListener('click', async () => {
      if (!bankSelect.value) {
        alert('Please select a bank.');
        return;
      }
      eftButton.disabled = true;
      eftButton.textContent = 'Processing...';
      try {
        await createPayment('eft', cartAmount, selectedAddressType, saveCardBool = false, {
          customer_bank: bankSelect.value
        });
      } finally {
        eftButton.disabled = false;
        eftButton.textContent = 'Continue with EFTsecure';
      }
    });

    // ----- Saved Card -----
    savedCardButton.addEventListener('click', async () => {
      if (!guid) {
        alert('No saved card on file. Please use a new card.');
        return;
      }
      savedCardButton.disabled = true;
      savedCardButton.textContent = 'Processing...';
      try {
        await createPayment('saved_card', cartAmount, selectedAddressType, saveCardBool = false, { guid });
      } finally {
        savedCardButton.disabled = false;
        savedCardButton.textContent = 'Pay with Saved Card';
      }
    });

    // ----- New Card -----
    newCardButton.addEventListener('click', async () => {
      const cardNumber = document.getElementById('card-number').value.replace(/\s/g, '');
      const expiryDate = document.getElementById('expiry-date').value;
      const cvv = document.getElementById('cvv').value;
      const cardHolderName = document.getElementById('card-holder').value.trim();
      const saveCardBool = document.getElementById('check-save-card').checked;

      // Validation
      if (!cardNumber || !expiryDate || !cvv || !cardHolderName) {
        alert('Please fill in all card details.');
        return;
      }
      if (!/^\d{16}$/.test(cardNumber)) {
        alert('Please enter a valid 16-digit card number.');
        return;
      }
      if (!/^\d{2}\/\d{2}$/.test(expiryDate)) {
        alert('Please enter a valid expiry date (MM/YY).');
        return;
      }
      if (!/^\d{3,4}$/.test(cvv)) {
        alert('Please enter a valid CVV.');
        return;
      }

      // Check expiry is not in the past
      const [month, year] = expiryDate.split('/').map(Number);
      const now = new Date();
      const expiry = new Date(2000 + year, month - 1);
      if (expiry < now) {
        alert('Your card has expired.');
        return;
      }

      newCardButton.disabled = true;
      newCardButton.textContent = 'Processing...';

      try {
        await createPayment('credit_card', cartAmount, selectedAddressType, saveCardBool, {
          cardNumber,
          expiryDate,
          cvv,
          cardHolderName,
          user_id: localStorage.getItem('user_id')
        });
      } finally {
        newCardButton.disabled = false;
        newCardButton.textContent = 'Pay Securely';
      }
    });
  </script>
</body>

</html>
