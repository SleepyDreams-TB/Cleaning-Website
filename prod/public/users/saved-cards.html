<!DOCTYPE html>
<html lang="en">

<head>
  <link rel="icon" href="/assets/burger.ico" type="image/x-icon">
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Saved Cards</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <style>
    body {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
    }

    .cards-container {
      background: rgba(255, 255, 255, 0.95);
      backdrop-filter: blur(10px);
      border-radius: 20px;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
    }

    .cards-header {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
      padding: 40px;
      border-radius: 20px 20px 0 0;
      text-align: center;
    }

    .cards-header h2 {
      font-size: 32px;
      font-weight: bold;
      margin-bottom: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
    }

    .cards-header p {
      opacity: 0.9;
      font-size: 14px;
    }

    .content-section {
      padding: 40px;
    }

    .info-box {
      background: #eff6ff;
      border-left: 4px solid #667eea;
      padding: 14px 16px;
      border-radius: 8px;
      margin-bottom: 24px;
      font-size: 14px;
      color: #1f2937;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .divider {
      height: 1px;
      background: #e5e7eb;
      margin: 32px 0;
    }

    .section-label {
      font-size: 13px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: #9ca3af;
      margin-bottom: 16px;
    }

    /* ── Saved Card Row ── */
    .card-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      background: #f9fafb;
      border: 2px solid #e5e7eb;
      border-radius: 12px;
      padding: 16px 20px;
      margin-bottom: 12px;
      transition: border-color 0.2s;
    }

    .card-row:hover {
      border-color: #667eea;
    }

    .card-row-info {
      display: flex;
      align-items: center;
      gap: 16px;
    }

    .card-icon {
      width: 44px;
      height: 44px;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      color: white;
      font-size: 18px;
      flex-shrink: 0;
    }

    .card-digits {
      font-weight: 700;
      color: #1f2937;
      font-size: 15px;
      margin-bottom: 3px;
    }

    .card-expiry {
      font-size: 13px;
      color: #6b7280;
    }

    /* ── Form ── */
    .form-group {
      margin-bottom: 24px;
    }

    .form-group label {
      display: flex;
      align-items: center;
      gap: 8px;
      font-weight: 600;
      color: #1f2937;
      margin-bottom: 8px;
      font-size: 14px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .form-group label i {
      color: #667eea;
      font-size: 16px;
    }

    .form-input {
      width: 100%;
      border: 2px solid #e5e7eb;
      padding: 12px 16px;
      border-radius: 10px;
      font-size: 14px;
      transition: all 0.3s;
      background: white;
      font-family: inherit;
    }

    .form-input:focus {
      outline: none;
      border-color: #667eea;
      box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
    }

    .form-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 24px;
    }

    .btn-submit {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
      padding: 14px 32px;
      border-radius: 10px;
      border: none;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s;
      width: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      font-size: 16px;
      margin-top: 8px;
    }

    .btn-submit:hover {
      transform: translateY(-2px);
      box-shadow: 0 10px 25px rgba(102, 126, 234, 0.4);
    }

    .btn-submit:disabled {
      opacity: 0.6;
      cursor: not-allowed;
      transform: none;
      box-shadow: none;
    }

    .security-note {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      color: #9ca3af;
      font-size: 12px;
      margin-top: 14px;
    }

    .security-note i {
      color: #22c55e;
    }

    @media (max-width: 768px) {
      .form-grid {
        grid-template-columns: 1fr;
      }

      .cards-container {
        margin: 16px;
      }

      .content-section {
        padding: 24px;
      }

      .cards-header {
        padding: 30px 20px;
      }

      .cards-header h2 {
        font-size: 24px;
      }
    }
  </style>
</head>

<body>

  <header class="bg-black shadow p-4 flex justify-between items-center">
    <nav>
      <div id="navbar-container"></div>
    </nav>
  </header>

  <main class="container mx-auto py-12 pb-12">
    <div class="cards-container">

      <!-- Header -->
      <div class="cards-header">
        <h2><i class="fas fa-credit-card"></i> Saved Cards</h2>
        <p>Manage your saved payment methods</p>
      </div>

      <!-- Content -->
      <div class="content-section">

        <!-- Message -->
        <div id="message" class="info-box hidden">
          <i id="messageIcon" class="fas"></i>
          <span id="messageText"></span>
        </div>

        <!-- Saved Cards -->
        <div class="section-label"><i class="fas fa-wallet"></i> Your Cards</div>

        <div id="cardsList">
          <!-- Rendered by saved-cards.js -->
          <p class="text-gray-400 text-sm text-center py-4">Loading...</p>
        </div>

        <div class="divider"></div>

        <!-- Add New Card -->
        <div class="section-label"><i class="fas fa-plus"></i> Add New Card</div>

        <form id="addCardForm">

          <div class="form-group">
            <label><i class="fas fa-credit-card"></i> Card Number</label>
            <input type="text" id="cardNumber" class="form-input" placeholder="1234 5678 9012 3456" maxlength="19"
              autocomplete="cc-number" required>
          </div>

          <div class="form-group">
            <label><i class="fas fa-user"></i> Card Holder Name</label>
            <input type="text" id="cardHolderName" class="form-input" placeholder="Name as it appears on card"
              autocomplete="cc-name" required>
          </div>

          <div class="form-grid">
            <div class="form-group">
              <label><i class="fas fa-calendar"></i> Expiry Date</label>
              <input type="text" id="expiryDate" class="form-input" placeholder="MM/YY" maxlength="5"
                autocomplete="cc-exp" required>
            </div>
            <div class="form-group">
              <label><i class="fas fa-lock"></i> CVV</label>
              <input type="password" id="cvv" class="form-input" placeholder="•••" maxlength="4" autocomplete="cc-csc"
                required>
            </div>
          </div>

          <button type="submit" id="addCardBtn" class="btn-submit">
            <i class="fas fa-plus"></i> Add Card
          </button>

          <div class="security-note">
            <i class="fas fa-shield-halved"></i>
            Your card details are encrypted and stored securely
          </div>

        </form>
      </div>
    </div>
  </main>

  <footer class="text-center text-sm py-6 bg-gray-100">
    © 2025 King Burger's Store. All rights reserved.
  </footer>

  <script type="module">
    import { initNavbar } from '/navbar.js';
    initNavbar("navbar-container");
  </script>
  <script type="module" src="/users/saved-cards.js"></script>

</body>

</html>
